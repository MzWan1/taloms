# ===== DEVELOPMENT PROFILE =====
# DO NOT set spring.profiles.active here - it's set in application.properties

# ===== DATABASE =====
# Uses default values from application.properties
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taloms_db}
spring.datasource.username=${DB_USERNAME:taloms_user}
spring.datasource.password=${DB_PASSWORD:taloms_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA - Development settings =====
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===== DEVTOOLS =====
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ===== THYMELEAF - No caching in dev =====
spring.thymeleaf.cache=false