# Development Profile
spring.profiles.active=dev

# Database - uses environment variables with defaults
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taloms_db}
spring.datasource.username=${DB_USERNAME:taloms_user}
spring.datasource.password=${DB_PASSWORD:taloms_pass}

# JPA - Development settings
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Devtools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Thymeleaf - No caching in dev
spring.thymeleaf.cache=false