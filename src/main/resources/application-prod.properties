# ===== PRODUCTION PROFILE =====
spring.profiles.active=prod

# ===== DATABASE =====
# Use environment variables (set in Render dashboard)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== HIKARI =====
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=5

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===== FLYWAY =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-migration-naming=true

# ===== THYMELEAF =====
# Disable cache for debugging (set to true in production)
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ===== SERVER =====
server.port=8080

# ===== LOGGING =====
# Debug level for troubleshooting household module
logging.level.za.co.taloms=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.thymeleaf=INFO
logging.level.org.hibernate=WARN
logging.level.org.flywaydb=INFO

# ===== LOGGING PATTERN =====
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# ===== ERROR HANDLING (Spring Boot 4.1.0) =====
# Use server.error.include-binding-errors instead of deprecated properties
spring.web.error.include-binding-errors=always
spring.web.error.include-exception=false
spring.web.error.include-message=always
spring.web.error.include-stacktrace=never

# ===== JWT =====
taloms.jwt.secret=${JWT_SECRET}
taloms.jwt.expiration=${JWT_EXPIRATION}

# ===== APP =====
taloms.app.base-url=${APP_BASE_URL}
taloms.upload.path=${APP_UPLOAD_PATH:uploads}

# ===== DATE FORMAT =====
spring.mvc.format.date=iso