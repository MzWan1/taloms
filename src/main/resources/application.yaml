spring:
  application:
    name: taloms

  # Database Configuration
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taloms_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    show-sql: false
    open-in-view: false

  # Flyway configuration is defined in application.properties (and profile-specific
  # application-prod.properties / application-dev.properties). Keep a single source
  # of truth to avoid conflicting migration settings across environments.

  # Thymeleaf Configuration
  thymeleaf:
    cache: false
    encoding: UTF-8
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html

  # Mail Configuration
  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:noreply@taloms.co.za}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # Servlet Configuration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

# Server Configuration
server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: false
        same-site: lax
  error:
    include-stacktrace: never
    include-exception: false
    include-message: always

# Logging Configuration
logging:
  level:
    root: INFO
    za.co.taloms: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

# Application Specific Configuration
taloms:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-jwt-key-for-development-only}
    expiration: ${JWT_EXPIRATION:28800000}
  upload:
    path: ${APP_UPLOAD_PATH:uploads}
    max-size: 20971520
  app:
    base-url: ${APP_BASE_URL:http://localhost:8080}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    show-details: always