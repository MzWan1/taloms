# Use H2 with PostgreSQL compatibility mode
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:taloms_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.flyway.enabled=false

# Security
taloms.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
taloms.jwt.expiration=28800000

# Logging
logging.level.za.co.taloms=ERROR
logging.level.org.springframework.test=INFO
logging.level.org.hibernate=ERROR