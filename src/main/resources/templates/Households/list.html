<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Household Management | TALOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container-fluid px-4 py-4">
    <h4 class="fw-bold text-navy mb-0">Household Management</h4>
    <p class="text-muted small mb-0">Manage all households linked to parcels</p>
    <p class="text-muted small mb-0" style="color:red; font-weight:bold;">DEPLOY MARKER: 23bb45c</p>

    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center py-3">
                <div class="fw-bold fs-3 text-navy" th:text="${totalCount != null ? totalCount : 0}">0</div>
                <div class="small text-muted">Total Households</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center py-3">
                <div class="fw-bold fs-3 text-success" th:text="${activeCount != null ? activeCount : 0}">0</div>
                <div class="small text-muted">Active</div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th class="px-4">#</th>
                        <th>Household Head</th>
                        <th>ID Number</th>
                        <th>Parcel</th>
                        <th>Village</th>
                        <th>Registration Date</th>
                        <th>Status</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${households == null or households.empty}">
                        <td colspan="8" class="text-center py-5 text-muted">
                            <span class="fw-semibold">No households found</span>
                        </td>
                    </tr>
                    <tr th:each="household, stat : ${households}">
                        <td class="px-4 text-muted small" th:text="${stat.count}">1</td>
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <div class="household-avatar"
                                     th:text="${household.householdHeadName != null ? #strings.substring(household.householdHeadName,0,2).toUpperCase() : 'HH'}">HH</div>
                                <div>
                                    <a th:href="@{/households/{id}(id=${household.id})}"
                                       class="fw-semibold text-navy text-decoration-none small"
                                       th:text="${household.householdHeadName}">Name</a>
                                    <div class="text-muted" style="font-size:0.78rem"
                                         th:if="${household.contactPhone != null}"
                                         th:text="${household.contactPhone}">Phone</div>
                                </div>
                            </div>
                        </td>
                        <td><code class="small" th:text="${household.householdHeadIdNumber}">ID</code></td>
                        <td class="small" th:text="${household.standNumber}">Stand</td>
                        <td class="small" th:text="${household.villageName}">Village</td>
                        <td class="small" th:text="${household.registrationDate != null ?
                                #temporals.format(household.registrationDate,'dd MMM yyyy') : '—'}">Date</td>
                        <td>
                            <span th:if="${household.active}" class="badge bg-success">Active</span>
                            <span th:if="${!household.active}" class="badge bg-secondary">Inactive</span>
                        </td>
                        <td class="text-center">
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/households/{id}(id=${household.id})}" class="btn btn-outline-info" title="View">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/households/{id}/edit(id=${household.id})}" class="btn btn-outline-primary" title="Edit"
                                   sec:authorize="hasAnyRole('SYSTEM_ADMIN','ROLE_TA_ADMINISTRATOR','ROLE_DATA_CAPTURER')">
                                    <i class="bi bi-pencil"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
    .household-avatar {
        width: 36px; height: 36px;
        background: #D6E4F0;
        color: #1B3A6B;
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
