<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Household | TALOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container-fluid px-4 py-4">
    <h4 class="fw-bold text-navy mb-0">Create New Household</h4>
    <p class="text-muted small mb-0">Register a new household on a parcel</p>
    <p class="text-muted small mb-0" style="color:red; font-weight:bold;">DEPLOY MARKER: 23bb45c</p>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <form th:action="@{/households/create}"
                  th:object="${form}"
                  method="post"
                  id="householdForm">

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="householdHeadName" class="form-label">Household Head Name <span class="text-danger">*</span></label>
                                <input type="text" id="householdHeadName" name="householdHeadName" class="form-control"
                                       th:value="${form.householdHeadName}" required>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="householdHeadIdNumber" class="form-label">ID Number <span class="text-danger">*</span></label>
                                <input type="text" id="householdHeadIdNumber" name="householdHeadIdNumber" class="form-control"
                                       th:value="${form.householdHeadIdNumber}" maxlength="13" required>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="contactPhone" class="form-label">Contact Phone</label>
                                <input type="tel" id="contactPhone" name="contactPhone" class="form-control"
                                       th:value="${form.contactPhone}" placeholder="+27XXXXXXXXX">
                            </div>

                            <div class="col-12">
                                <label for="contactEmail" class="form-label">Contact Email</label>
                                <input type="email" id="contactEmail" name="contactEmail" class="form-control"
                                       th:value="${form.contactEmail}" placeholder="e.g. thabo@example.com">
                            </div>

                            <div class="col-12">
                                <label for="parcelId" class="form-label">Parcel <span class="text-danger">*</span></label>
                                <select id="parcelId" name="parcelId" class="form-select" required>
                                    <option value="">— Select Parcel —</option>
                                    <option th:each="p : ${availableParcels}"
                                            th:value="${p.id}"
                                            th:text="${p.parcelNumber != null ? p.parcelNumber : 'Parcel ' + p.id}">
                                    </option>
                                </select>
                                <div th:if="${availableParcels == null or availableParcels.empty}"
                                     class="text-warning small mt-1">
                                    <i class="bi bi-exclamation-triangle me-1"></i>
                                    No available parcels found. Please create a parcel first.
                                </div>
                            </div>

                            <div class="col-12" th:if="${activePtos != null and !activePtos.isEmpty()}">
                                <label for="ptoId" class="form-label">PTO</label>
                                <select id="ptoId" name="ptoId" class="form-select">
                                    <option value="">— Select PTO —</option>
                                    <option th:each="pto : ${activePtos}"
                                            th:value="${pto.id}"
                                            th:text="${pto.ptoNumber != null ? pto.ptoNumber : 'PTO ' + pto.id}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="registrationDate" class="form-label">Registration Date</label>
                                <input type="date" id="registrationDate" name="registrationDate" class="form-control"
                                       th:value="${form.registrationDate}">
                            </div>

                            <div class="col-12">
                                <label for="notes" class="form-label">Notes</label>
                                <textarea id="notes" name="notes" class="form-control" rows="2"
                                          placeholder="Additional notes about this household...">${form.notes}</textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-3 justify-content-end mt-4 mb-4">
                    <a th:href="@{/households}" class="btn btn-light px-4">
                        <i class="bi bi-x me-1"></i>Cancel
                    </a>
                    <button type="submit" class="btn btn-navy px-4 fw-semibold" id="submitBtn">
                        <i class="bi bi-save me-2"></i>Create Household
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
