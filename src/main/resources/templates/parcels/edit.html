<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="'Edit Parcel ' + ${parcel.parcelNumber} + ' | TALOMS'">Edit Parcel | TALOMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link th:href="@{/css/taloms.css}" rel="stylesheet">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar('parcels')}"></nav>

<div class="container-fluid px-4 py-4">

  <!-- Flash -->
  <div th:if="${errorMessage}"
       class="alert alert-danger alert-dismissible fade show border-0 shadow-sm mb-4">
    <i class="bi bi-exclamation-circle-fill me-2"></i>
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Header -->
  <div class="d-flex align-items-start justify-content-between mb-4 flex-wrap gap-3">
    <div>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-1 small">
          <li class="breadcrumb-item">
            <a th:href="@{/dashboard}" class="text-muted text-decoration-none">Dashboard</a>
          </li>
          <li class="breadcrumb-item">
            <a th:href="@{/parcels}" class="text-muted text-decoration-none">Parcels</a>
          </li>
          <li class="breadcrumb-item">
            <a th:href="@{/parcels/{id}(id=${parcel.id})}" class="text-muted text-decoration-none" th:text="${parcel.parcelNumber}">Parcel</a>
          </li>
          <li class="breadcrumb-item active">Edit</li>
        </ol>
      </nav>
      <h4 class="fw-bold text-navy mb-0">
        <i class="bi bi-pencil-square me-2"></i>
        Edit Parcel <span th:text="${parcel.parcelNumber}">PRC-2026-00001</span>
      </h4>
      <p class="text-muted small mb-0">
        Stand <strong th:text="${parcel.standNumber}">1</strong> ·
        <span th:text="${parcel.villageName}">Village</span>
      </p>
    </div>
    <a th:href="@{/parcels/{id}(id=${parcel.id})}" class="btn btn-outline-secondary px-3">
      <i class="bi bi-arrow-left me-1"></i>Back to Parcel
    </a>
  </div>

  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <form th:action="@{/parcels/{id}/edit(id=${parcel.id})}"
            th:object="${form}"
            method="post">

        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white border-bottom py-3">
            <h6 class="fw-bold text-navy mb-0">
              <i class="bi bi-info-circle me-2"></i>Parcel Details
            </h6>
          </div>
          <div class="card-body p-4">
            <div class="row g-3">
              <!-- Stand Number -->
              <div class="col-12">
                <label for="standNumber" class="form-label">
                  Stand Number <span class="text-danger">*</span>
                </label>
                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-hash"></i>
                                    </span>
                  <input type="text"
                         id="standNumber"
                         name="standNumber"
                         class="form-control"
                         th:value="${form.standNumber}"
                         required>
                </div>
              </div>

              <!-- Parcel Type -->
              <div class="col-12">
                <label for="parcelType" class="form-label">
                  Parcel Type <span class="text-danger">*</span>
                </label>
                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-tag"></i>
                                    </span>
                  <select id="parcelType"
                          name="parcelType"
                          class="form-select"
                          required>
                    <option value="">— Select Type —</option>
                    <option th:each="t : ${types}"
                            th:value="${t.name()}"
                            th:text="${t.displayName}"
                            th:selected="${t.name() == form.parcelType}">
                    </option>
                  </select>
                </div>
              </div>

              <!-- Village -->
              <div class="col-12">
                <label for="villageId" class="form-label">
                  Village <span class="text-danger">*</span>
                </label>
                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-houses"></i>
                                    </span>
                  <select id="villageId"
                          name="villageId"
                          class="form-select"
                          required>
                    <option th:each="v : ${villages}"
                            th:value="${v.id}"
                            th:text="${v.villageName}"
                            th:selected="${v.id == form.villageId}">
                    </option>
                  </select>
                </div>
              </div>

              <!-- Notes -->
              <div class="col-12">
                <label for="notes" class="form-label">Notes</label>
                <textarea id="notes"
                          name="notes"
                          class="form-control"
                          rows="2">${form.notes}</textarea>
              </div>

              <!-- Status -->
              <div class="col-12">
                <label for="status" class="form-label">Status</label>
                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-circle"></i>
                                    </span>
                  <select id="status" name="status" class="form-select">
                    <option th:each="s : ${statuses}"
                            th:value="${s.name()}"
                            th:text="${s.displayName}"
                            th:selected="${s.name() == parcel.status.name()}">
                    </option>
                  </select>
                </div>
              </div>

              <!-- Boundary Points -->
              <div class="col-12">
                <label for="boundariesJson" class="form-label">
                  Boundary Points (JSON) <span class="text-danger">*</span>
                </label>
                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-geo-alt"></i>
                                    </span>
                  <textarea id="boundariesJson"
                            name="boundariesJson"
                            class="form-control"
                            rows="4"
                            required>${form.boundariesJson}</textarea>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Submit -->
        <div class="d-flex gap-3 justify-content-end mt-4 mb-4">
          <a th:href="@{/parcels/{id}(id=${parcel.id})}" class="btn btn-light px-4">
            <i class="bi bi-x me-1"></i>Cancel
          </a>
          <button type="submit" class="btn btn-navy px-4 fw-semibold">
            <i class="bi bi-save me-2"></i>Update Parcel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
