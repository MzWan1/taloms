<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | TALOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/taloms.css}" rel="stylesheet">
</head>
<body class="bg-navy min-vh-100 d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">

            <!-- Logo -->
            <div class="text-center mb-4">
                <div class="bg-white rounded-circle d-inline-flex
                            align-items-center justify-content-center mb-3"
                     style="width:72px;height:72px;">
                    <i class="bi bi-geo-alt-fill text-navy fs-2"></i>
                </div>
                <h1 class="text-white fw-bold fs-3">TALOMS</h1>
            </div>

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-sm-5">

                    <div class="text-center mb-4">
                        <div class="rounded-circle d-inline-flex align-items-center
                                    justify-content-center mb-3"
                             style="width:56px;height:56px;background:#D6E4F0">
                            <i class="bi bi-lock-fill text-navy fs-4"></i>
                        </div>
                        <h5 class="fw-bold text-navy mb-1">Set New Password</h5>
                        <p class="text-muted small mb-0">
                            Enter and confirm your new password below.
                        </p>
                    </div>

                    <!-- Error -->
                    <div th:if="${errorMessage}"
                         class="alert alert-danger border-0 py-2 small">
                        <i class="bi bi-exclamation-circle me-1"></i>
                        <span th:text="${errorMessage}"></span>
                    </div>

                    <form th:action="@{/reset-password}" method="post">
                        <!-- Hidden token -->
                        <input type="hidden" name="token"
                               th:value="${param.token}">

                        <!-- New Password -->
                        <div class="mb-3">
                            <label for="newPassword" class="form-label fw-semibold small">
                                New Password <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock text-muted"></i>
                                </span>
                                <input type="password"
                                       id="newPassword"
                                       name="newPassword"
                                       class="form-control border-start-0 ps-0 border-end-0"
                                       placeholder="Minimum 8 characters"
                                       required>
                                <button type="button"
                                        class="input-group-text bg-light border-start-0"
                                        onclick="togglePwd('newPassword','icon1')">
                                    <i class="bi bi-eye" id="icon1"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label for="confirmPassword"
                                   class="form-label fw-semibold small">
                                Confirm Password <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock-fill text-muted"></i>
                                </span>
                                <input type="password"
                                       id="confirmPassword"
                                       name="confirmPassword"
                                       class="form-control border-start-0 ps-0 border-end-0"
                                       placeholder="Re-enter new password"
                                       required>
                                <button type="button"
                                        class="input-group-text bg-light border-start-0"
                                        onclick="togglePwd('confirmPassword','icon2')">
                                    <i class="bi bi-eye" id="icon2"></i>
                                </button>
                            </div>
                            <div id="matchFeedback"
                                 class="mt-1 small text-danger"
                                 style="display:none">
                                <i class="bi bi-x-circle me-1"></i>Passwords do not match
                            </div>
                        </div>

                        <button type="submit"
                                class="btn btn-navy w-100 fw-semibold py-2 mb-3">
                            <i class="bi bi-check-circle me-2"></i>Reset Password
                        </button>

                        <div class="text-center">
                            <a th:href="@{/login}"
                               class="small text-muted text-decoration-none">
                                <i class="bi bi-arrow-left me-1"></i>Back to Sign In
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePwd(fieldId, iconId) {
        const f = document.getElementById(fieldId);
        const i = document.getElementById(iconId);
        f.type = f.type === 'password' ? 'text' : 'password';
        i.classList.toggle('bi-eye');
        i.classList.toggle('bi-eye-slash');
    }

    document.getElementById('confirmPassword').addEventListener('input', function () {
        const pwd = document.getElementById('newPassword').value;
        const fb  = document.getElementById('matchFeedback');
        fb.style.display = this.value && this.value !== pwd ? 'block' : 'none';
    });

    document.querySelector('form').addEventListener('submit', function (e) {
        const pwd = document.getElementById('newPassword').value;
        const cfm = document.getElementById('confirmPassword').value;
        if (pwd !== cfm) {
            e.preventDefault();
            document.getElementById('matchFeedback').style.display = 'block';
        }
    });
</script>
</body>
</html>
