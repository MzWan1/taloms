<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TALOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/taloms.css}" rel="stylesheet">
</head>
<body class="bg-navy min-vh-100 d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">

            <!-- Logo -->
            <div class="text-center mb-4">
                <div class="bg-white rounded-circle d-inline-flex
                            align-items-center justify-content-center mb-3"
                     style="width:72px;height:72px;">
                    <i class="bi bi-geo-alt-fill text-navy fs-2"></i>
                </div>
                <h1 class="text-white fw-bold fs-3">TALOMS</h1>
                <p class="text-white-50 small">
                    Traditional Authority Land &amp; Occupancy<br>Management System
                </p>
            </div>

            <!-- Card -->
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4 p-sm-5">
                    <h2 class="card-title text-center fw-bold text-navy mb-4 fs-5">
                        Sign In
                    </h2>

                    <!-- Error message -->
                    <div th:if="${param.error}"
                         class="alert alert-danger py-2 small" role="alert">
                        <i class="bi bi-exclamation-circle me-1"></i>
                        Invalid username or password. Please try again.
                    </div>

                    <!-- Logout message -->
                    <div th:if="${param.logout}"
                         class="alert alert-success py-2 small" role="alert">
                        <i class="bi bi-check-circle me-1"></i>
                        You have been logged out successfully.
                    </div>

                    <!-- Login form -->
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold small">
                                Username
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-person text-muted"></i>
                                </span>
                                <input type="text"
                                       id="username"
                                       name="username"
                                       class="form-control border-start-0 ps-0"
                                       placeholder="Enter your username"
                                       required
                                       autofocus>
                            </div>
                        </div>

                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <label for="password" class="form-label fw-semibold small mb-0">
                                    Password
                                </label>
                                <a th:href="@{/forgot-password}"
                                   class="small text-navy text-decoration-none">
                                    Forgot password?
                                </a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock text-muted"></i>
                                </span>
                                <input type="password"
                                       id="password"
                                       name="password"
                                       class="form-control border-start-0 ps-0 border-end-0"
                                       placeholder="Enter your password"
                                       required>
                                <button type="button"
                                        class="input-group-text bg-light border-start-0"
                                        onclick="togglePassword()">
                                    <i class="bi bi-eye" id="toggleIcon"></i>
                                </button>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input"
                                       type="checkbox"
                                       id="remember-me"
                                       name="remember-me">
                                <label class="form-check-label small" for="remember-me">
                                    Remember me for 7 days
                                </label>
                            </div>
                        </div>

                        <button type="submit"
                                class="btn btn-navy w-100 fw-semibold py-2">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>
                    </form>
                </div>
            </div>

            <p class="text-center text-white-50 small mt-4">
                &copy; 2026 TALOMS &mdash; Traditional Authority Land System
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePassword() {
        const pwd  = document.getElementById('password');
        const icon = document.getElementById('toggleIcon');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            pwd.type = 'password';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
</body>
</html>
