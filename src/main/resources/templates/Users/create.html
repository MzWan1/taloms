<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User | TALOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/taloms.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-navy shadow-sm sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
            <i class="bi bi-geo-alt-fill me-2"></i>TALOMS
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active bg-white bg-opacity-10 rounded-2"
                       th:href="@{/users}">
                        <i class="bi bi-people me-1"></i>Users
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#"
                       data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name"
                              xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                            admin
                        </span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                        <li>
                            <form th:action="@{/logout}" method="post" class="m-0">
                                <button type="submit"
                                        class="dropdown-item py-2 text-danger fw-semibold">
                                    <i class="bi bi-box-arrow-right me-2"></i>Sign Out
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 py-4">

    <!-- Flash -->
    <div th:if="${errorMessage}"
         class="alert alert-danger alert-dismissible fade show border-0 shadow-sm mb-4">
        <i class="bi bi-exclamation-circle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Breadcrumb + Header -->
    <div class="mb-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-1 small">
                <li class="breadcrumb-item">
                    <a th:href="@{/dashboard}"
                       class="text-muted text-decoration-none">Dashboard</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/users}"
                       class="text-muted text-decoration-none">User Management</a>
                </li>
                <li class="breadcrumb-item active">Create User</li>
            </ol>
        </nav>
        <h4 class="fw-bold text-navy mb-0">
            <i class="bi bi-person-plus me-2"></i>Create New User
        </h4>
        <p class="text-muted small mb-0">
            Add a new system user and assign their role
        </p>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-8 col-xl-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom py-3">
                    <h6 class="fw-bold text-navy mb-0">
                        <i class="bi bi-person me-2"></i>User Details
                    </h6>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/users/create}"
                          th:object="${userForm}"
                          method="post"
                          novalidate>

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label for="fullName" class="form-label">
                                Full Name <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person"></i>
                                </span>
                                <input type="text"
                                       id="fullName"
                                       th:field="*{fullName}"
                                       class="form-control"
                                       placeholder="e.g. John Dlamini"
                                       required>
                            </div>
                        </div>

                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                Username <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">@</span>
                                <input type="text"
                                       id="username"
                                       th:field="*{username}"
                                       class="form-control"
                                       placeholder="e.g. jdlamini"
                                       required
                                       autocomplete="off">
                            </div>
                            <div class="form-text">
                                3–50 characters, no spaces.
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">
                                Email Address <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-envelope"></i>
                                </span>
                                <input type="email"
                                       id="email"
                                       th:field="*{email}"
                                       class="form-control"
                                       placeholder="e.g. jdlamini@taloms.co.za"
                                       required>
                            </div>
                        </div>

                        <!-- Role -->
                        <div class="mb-3">
                            <label for="roleName" class="form-label">
                                System Role <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-shield"></i>
                                </span>
                                <select id="roleName"
                                        th:field="*{roleName}"
                                        class="form-select"
                                        required>
                                    <option value="">— Select a role —</option>
                                    <option th:each="role : ${roles}"
                                            th:value="${role.name}"
                                            th:text="${role.description != null
                                                ? role.description
                                                : role.name}">
                                    </option>
                                </select>
                            </div>
                            <div class="form-text" id="roleHint"></div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password" class="form-label">
                                Password <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-lock"></i>
                                </span>
                                <input type="password"
                                       id="password"
                                       th:field="*{password}"
                                       class="form-control"
                                       placeholder="Minimum 8 characters"
                                       required
                                       autocomplete="new-password">
                                <button type="button"
                                        class="input-group-text bg-light"
                                        onclick="togglePwd('password','togglePwdIcon')">
                                    <i class="bi bi-eye" id="togglePwdIcon"></i>
                                </button>
                            </div>
                            <!-- Password strength -->
                            <div class="mt-2">
                                <div class="progress" style="height:4px;">
                                    <div class="progress-bar" id="pwdStrengthBar"
                                         style="width:0%;transition:width 0.3s"></div>
                                </div>
                                <small id="pwdStrengthText"
                                       class="text-muted"></small>
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label for="confirmPwd" class="form-label">
                                Confirm Password <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-lock-fill"></i>
                                </span>
                                <input type="password"
                                       id="confirmPwd"
                                       class="form-control"
                                       placeholder="Re-enter password"
                                       required>
                                <button type="button"
                                        class="input-group-text bg-light"
                                        onclick="togglePwd('confirmPwd','toggleCfmIcon')">
                                    <i class="bi bi-eye" id="toggleCfmIcon"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback" id="pwdMatchFeedback">
                                Passwords do not match.
                            </div>
                        </div>

                        <!-- Role descriptions info box -->
                        <div class="alert alert-info border-0 py-2 small mb-4"
                             id="roleInfoBox" style="display:none">
                            <i class="bi bi-info-circle me-1"></i>
                            <span id="roleInfoText"></span>
                        </div>

                        <!-- Actions -->
                        <div class="d-flex gap-3 justify-content-end">
                            <a th:href="@{/users}"
                               class="btn btn-light px-4">
                                <i class="bi bi-x me-1"></i>Cancel
                            </a>
                            <button type="submit"
                                    id="submitBtn"
                                    class="btn btn-navy px-4 fw-semibold">
                                <i class="bi bi-person-check me-2"></i>Create User
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ── Toggle password visibility ─────────────────────────────────────────
    function togglePwd(fieldId, iconId) {
        const f = document.getElementById(fieldId);
        const i = document.getElementById(iconId);
        f.type = f.type === 'password' ? 'text' : 'password';
        i.classList.toggle('bi-eye');
        i.classList.toggle('bi-eye-slash');
    }

    // ── Password strength meter ────────────────────────────────────────────
    document.getElementById('password').addEventListener('input', function () {
        const val = this.value;
        let score = 0;
        if (val.length >= 8)              score++;
        if (/[A-Z]/.test(val))            score++;
        if (/[0-9]/.test(val))            score++;
        if (/[^A-Za-z0-9]/.test(val))     score++;

        const bar  = document.getElementById('pwdStrengthBar');
        const text = document.getElementById('pwdStrengthText');
        const configs = [
            { pct: '0%',   cls: '',             label: '' },
            { pct: '25%',  cls: 'bg-danger',    label: 'Weak' },
            { pct: '50%',  cls: 'bg-warning',   label: 'Fair' },
            { pct: '75%',  cls: 'bg-info',      label: 'Good' },
            { pct: '100%', cls: 'bg-success',   label: 'Strong' },
        ];
        const c = configs[score];
        bar.style.width = c.pct;
        bar.className   = 'progress-bar ' + c.cls;
        text.textContent = c.label;
        text.className   = 'small ' + (score < 2 ? 'text-danger' : score < 4 ? 'text-warning' : 'text-success');
    });

    // ── Password match check ───────────────────────────────────────────────
    document.getElementById('confirmPwd').addEventListener('input', function () {
        const pwd = document.getElementById('password').value;
        const cfm = this.value;
        const fb  = document.getElementById('pwdMatchFeedback');
        if (cfm && cfm !== pwd) {
            this.classList.add('is-invalid');
            fb.style.display = 'block';
        } else {
            this.classList.remove('is-invalid');
            if (cfm && cfm === pwd) this.classList.add('is-valid');
            fb.style.display = 'none';
        }
    });

    // ── Role descriptions ──────────────────────────────────────────────────
    const roleDescriptions = {
        'ROLE_SYSTEM_ADMIN':    'Full system access — user management, all modules, system config.',
        'ROLE_TA_ADMINISTRATOR':'Approve/revoke PTOs, manage villages and authorities, view all reports.',
        'ROLE_LAND_OFFICER':    'Create and demarcate parcels, capture GPS coordinates.',
        'ROLE_DATA_CAPTURER':   'Capture household, resident, and business records; upload documents.',
        'ROLE_REPORT_VIEWER':   'Read-only — search, view records, download reports only.',
    };
    document.getElementById('roleName').addEventListener('change', function () {
        const box  = document.getElementById('roleInfoBox');
        const text = document.getElementById('roleInfoText');
        const desc = roleDescriptions[this.value];
        if (desc) {
            text.textContent = desc;
            box.style.display = 'block';
        } else {
            box.style.display = 'none';
        }
    });

    // ── Form submit guard (confirm passwords match) ────────────────────────
    document.querySelector('form').addEventListener('submit', function (e) {
        const pwd = document.getElementById('password').value;
        const cfm = document.getElementById('confirmPwd').value;
        if (pwd !== cfm) {
            e.preventDefault();
            document.getElementById('confirmPwd').classList.add('is-invalid');
            document.getElementById('pwdMatchFeedback').style.display = 'block';
            document.getElementById('confirmPwd').scrollIntoView({behavior:'smooth'});
        }
    });
</script>
</body>
</html>
