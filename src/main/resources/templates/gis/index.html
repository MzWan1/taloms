<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS Map | TALOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link th:href="@{/css/taloms.css}" rel="stylesheet">
    <style>
        #map { height: 70vh; border-radius: 8px; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .legend-color { width: 20px; height: 12px; border-radius: 2px; flex-shrink: 0; }
        .map-controls { position: absolute; top: 10px; right: 10px; z-index: 1000; }
    </style>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar('gis')}"></nav>

<div class="container-fluid px-4 py-4">

    <div th:if="${successMessage}"
         class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-4">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}"
         class="alert alert-danger alert-dismissible fade show border-0 shadow-sm mb-4">
        <i class="bi bi-exclamation-circle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Header -->
    <div class="d-flex align-items-start justify-content-between mb-4 flex-wrap gap-3">
        <div>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-1 small">
                    <li class="breadcrumb-item">
                        <a th:href="@{/dashboard}" class="text-muted text-decoration-none">Dashboard</a>
                    </li>
                    <li class="breadcrumb-item active">GIS Map</li>
                </ol>
            </nav>
            <h4 class="fw-bold text-navy mb-0">
                <i class="bi bi-map me-2"></i>GIS Map Viewer
            </h4>
            <p class="text-muted small mb-0">Interactive map showing all land parcels</p>
        </div>
        <a th:href="@{/dashboard}" class="btn btn-outline-secondary px-3">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
    </div>

    <!-- Controls -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body py-3">
            <div class="row g-3 align-items-end">
                <div class="col-12 col-md-4">
                    <label class="form-label small mb-1">Traditional Authority</label>
                    <select id="authoritySelect" class="form-select" onchange="loadVillages(this.value)">
                        <option value="">All Authorities</option>
                        <option th:each="a : ${authorities}"
                                th:value="${a.id}"
                                th:text="${a.authorityName}">
                        </option>
                    </select>
                </div>
                <div class="col-12 col-md-4">
                    <label class="form-label small mb-1">Village</label>
                    <select id="villageSelect" class="form-select" onchange="loadParcels()">
                        <option value="">Select Authority First</option>
                        <option th:each="v : ${villages}"
                                th:value="${v.id}"
                                th:text="${v.villageName}">
                        </option>
                    </select>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label small mb-1">Status Filter</label>
                    <select id="statusFilter" class="form-select" onchange="loadParcels()">
                        <option value="">All</option>
                        <option value="AVAILABLE">Available</option>
                        <option value="ALLOCATED">Allocated</option>
                        <option value="DISPUTED">Disputed</option>
                        <option value="RESERVED">Reserved</option>
                    </select>
                </div>
                <div class="col-6 col-md-2">
                    <button class="btn btn-navy w-100" onclick="resetMap()">
                        <i class="bi bi-arrow-counterclockwise me-1"></i>Reset
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- KPI Summary -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center py-2">
                <div class="fw-bold fs-5 text-navy" id="totalParcels">0</div>
                <div class="small text-muted">Total Parcels</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center py-2">
                <div class="fw-bold fs-5 text-success" id="availableParcels">0</div>
                <div class="small text-muted">Available</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center py-2">
                <div class="fw-bold fs-5 text-primary" id="allocatedParcels">0</div>
                <div class="small text-muted">Allocated</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm text-center py-2">
                <div class="fw-bold fs-5 text-danger" id="disputedParcels">0</div>
                <div class="small text-muted">Disputed</div>
            </div>
        </div>
    </div>

    <!-- Map -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-2 position-relative">
            <div id="map"></div>
            <!-- Legend -->
            <div class="map-controls">
                <div class="card shadow-sm" style="width: 150px;">
                    <div class="card-body p-2">
                        <div class="legend-item">
                            <div class="legend-color" style="background:#28a745;"></div>
                            <span class="small">Available</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background:#0d6efd;"></div>
                            <span class="small">Allocated</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background:#dc3545;"></div>
                            <span class="small">Disputed</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color" style="background:#ffc107;"></div>
                            <span class="small">Reserved</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ── Map Setup ──────────────────────────────────────────────────────────
    const map = L.map('map').setView([-25.0, 28.0], 8);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let parcelLayer = null;
    let geoJsonData = [];

    // ── Color mapping ──────────────────────────────────────────────────────
    const statusColors = {
        'AVAILABLE': '#28a745',
        'ALLOCATED': '#0d6efd',
        'DISPUTED': '#dc3545',
        'RESERVED': '#ffc107',
        'INACTIVE': '#6c757d'
    };

    // ── Load Villages ──────────────────────────────────────────────────────
    function loadVillages(authorityId) {
        const villageSelect = document.getElementById('villageSelect');
        villageSelect.innerHTML = '<option value="">Loading...</option>';

        if (!authorityId) {
            villageSelect.innerHTML = '<option value="">All Villages</option>';
            loadParcels();
            return;
        }

        fetch('/api/traditional-authorities/' + authorityId + '/villages')
            .then(r => r.json())
            .then(response => {
                if (response.success) {
                    villageSelect.innerHTML = '<option value="">All Villages</option>';
                    response.data.forEach(v => {
                        const opt = document.createElement('option');
                        opt.value = v.id;
                        opt.textContent = v.villageName;
                        villageSelect.appendChild(opt);
                    });
                    loadParcels();
                }
            })
            .catch(err => {
                console.error('Error loading villages:', err);
                villageSelect.innerHTML = '<option value="">Error loading villages</option>';
            });
    }

    // ── Load Parcels ──────────────────────────────────────────────────────
    function loadParcels() {
        const villageId = document.getElementById('villageSelect').value;
        const status = document.getElementById('statusFilter').value;

        let url = '/api/gis/parcels/';
        if (villageId) {
            url += 'village/' + villageId;
        } else {
            url += 'authority/1'; // Default
        }

        // Add status filter via query param
        if (status) {
            url += '?status=' + status;
        }

        fetch(url)
            .then(r => r.json())
            .then(response => {
                if (response.success) {
                    geoJsonData = response.data;
                    renderParcels(geoJsonData);
                    updateKPIs(geoJsonData.metadata);
                }
            })
            .catch(err => {
                console.error('Error loading parcels:', err);
            });
    }

    // ── Render Parcels ─────────────────────────────────────────────────────
    function renderParcels(data) {
        if (parcelLayer) {
            map.removeLayer(parcelLayer);
        }

        if (!data || !data.features || data.features.length === 0) {
            parcelLayer = L.layerGroup().addTo(map);
            return;
        }

        const features = data.features.map(f => {
            const status = f.properties.status || 'AVAILABLE';
            const color = statusColors[status] || '#6c757d';

            return {
                type: 'Feature',
                geometry: f.geometry,
                properties: {
                    ...f.properties,
                    color: color
                }
            };
        });

        parcelLayer = L.geoJSON(features, {
            style: function(feature) {
                return {
                    color: feature.properties.color,
                    weight: 2,
                    opacity: 0.8,
                    fillColor: feature.properties.color,
                    fillOpacity: 0.3
                };
            },
            onEachFeature: function(feature, layer) {
                const props = feature.properties;
                const popupContent = `
                <div class="fw-bold">${props.standNumber || 'N/A'}</div>
                <div><strong>Parcel:</strong> ${props.parcelNumber || 'N/A'}</div>
                <div><strong>Type:</strong> ${props.parcelTypeDisplay || 'N/A'}</div>
                <div><strong>Status:</strong> ${props.statusDisplay || 'N/A'}</div>
                <div><strong>Village:</strong> ${props.villageName || 'N/A'}</div>
                <div><strong>Area:</strong> ${props.areaM2 ? props.areaM2.toFixed(2) + ' m²' : 'N/A'}</div>
                ${props.ptoNumber ? `<div><strong>PTO:</strong> ${props.ptoNumber}</div>` : ''}
                ${props.ptoHolderName ? `<div><strong>Holder:</strong> ${props.ptoHolderName}</div>` : ''}
                <hr class="my-1">
                <a href="/parcels/${props.id}" class="btn btn-sm btn-navy w-100">View Parcel</a>
            `;
                layer.bindPopup(popupContent);
            }
        }).addTo(map);

        // Fit map to bounds
        if (features.length > 0) {
            const bounds = parcelLayer.getBounds();
            if (bounds.isValid()) {
                map.fitBounds(bounds, { padding: [50, 50] });
            }
        }
    }

    // ── Update KPIs ────────────────────────────────────────────────────────
    function updateKPIs(metadata) {
        if (!metadata) return;
        document.getElementById('totalParcels').textContent = metadata.totalCount || 0;
        document.getElementById('availableParcels').textContent = metadata.availableCount || 0;
        document.getElementById('allocatedParcels').textContent = metadata.allocatedCount || 0;
        document.getElementById('disputedParcels').textContent = metadata.disputedCount || 0;
    }

    // ── Reset Map ──────────────────────────────────────────────────────────
    function resetMap() {
        document.getElementById('authoritySelect').value = '';
        document.getElementById('villageSelect').innerHTML = '<option value="">All Villages</option>';
        document.getElementById('statusFilter').value = '';

        // Load all parcels
        fetch('/api/gis/parcels/authority/1')
            .then(r => r.json())
            .then(response => {
                if (response.success) {
                    geoJsonData = response.data;
                    renderParcels(geoJsonData);
                    updateKPIs(geoJsonData.metadata);
                    map.setView([-25.0, 28.0], 8);
                }
            });
    }

    // ── Initialize ────────────────────────────────────────────────────────
    // Load initial data
    setTimeout(loadParcels, 500);
</script>
</body>
</html>
