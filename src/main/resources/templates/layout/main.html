<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle} + ' | TALOMS'">TALOMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link th:href="@{/css/taloms.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-navy shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
      <i class="bi bi-geo-alt-fill me-2"></i>TALOMS
    </a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/dashboard}">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('SYSTEM_ADMIN')">
          <a class="nav-link" th:href="@{/users}">
            <i class="bi bi-people me-1"></i>Users
          </a>
        </li>
        <li class="nav-item" sec:authorize="hasAnyRole('SYSTEM_ADMIN','TA_ADMINISTRATOR')">
          <a class="nav-link" href="#">
            <i class="bi bi-building me-1"></i>Authorities
          </a>
        </li>
        <li class="nav-item" sec:authorize="hasAnyRole('SYSTEM_ADMIN','TA_ADMINISTRATOR','LAND_OFFICER')">
          <a class="nav-link" href="#">
            <i class="bi bi-file-earmark-text me-1"></i>PTOs
          </a>
        </li>
        <li class="nav-item" sec:authorize="hasAnyRole('SYSTEM_ADMIN','TA_ADMINISTRATOR','LAND_OFFICER')">
          <a class="nav-link" href="#">
            <i class="bi bi-map me-1"></i>Parcels
          </a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#"
             data-bs-toggle="dropdown">
            <i class="bi bi-person-circle me-1"></i>
            <span sec:authentication="name">User</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li>
              <a class="dropdown-item" th:href="@{/users/change-password}">
                <i class="bi bi-key me-2"></i>Change Password
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <form th:action="@{/logout}" method="post">
                <button type="submit" class="dropdown-item text-danger">
                  <i class="bi bi-box-arrow-right me-2"></i>Logout
                </button>
              </form>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Page Content -->
<div class="container-fluid px-4 py-4">
  <!-- Flash messages -->
  <div th:if="${successMessage}"
       class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="bi bi-check-circle me-2"></i>
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${errorMessage}"
       class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="bi bi-exclamation-circle me-2"></i>
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Page fragment -->
  <div th:replace="${content}">
    Page content goes here
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/taloms.js}"></script>
</body>
</html>
