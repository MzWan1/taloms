<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Authority | TALOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/taloms.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav th:replace="~{fragments/navbar :: navbar('authorities')}"></nav>

<div class="container-fluid px-4 py-4">

    <!-- Flash -->
    <div th:if="${errorMessage}"
         class="alert alert-danger alert-dismissible fade show border-0 shadow-sm mb-4">
        <i class="bi bi-exclamation-circle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Breadcrumb + Header -->
    <div class="d-flex align-items-start justify-content-between mb-4 flex-wrap gap-3">
        <div>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-1 small">
                    <li class="breadcrumb-item">
                        <a th:href="@{/dashboard}"
                           class="text-muted text-decoration-none">Dashboard</a>
                    </li>
                    <li class="breadcrumb-item">
                        <a th:href="@{/authorities}"
                           class="text-muted text-decoration-none">Authorities</a>
                    </li>
                    <li class="breadcrumb-item active">Add Authority</li>
                </ol>
            </nav>
            <h4 class="fw-bold text-navy mb-0">
                <i class="bi bi-building-add me-2"></i>Add Traditional Authority
            </h4>
            <p class="text-muted small mb-0">
                Register a new Traditional Authority and its leadership
            </p>
        </div>
        <a th:href="@{/authorities}"
           class="btn btn-outline-secondary px-3">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-9 col-xl-8">
            <form th:action="@{/authorities/create}"
                  th:object="${form}"
                  method="post"
                  novalidate>

                <!-- ── Authority Identity ──────────────────────────── -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-white border-bottom py-3">
                        <h6 class="fw-bold text-navy mb-0">
                            <i class="bi bi-building me-2"></i>
                            Authority Identity
                        </h6>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">

                            <!-- Authority Name -->
                            <div class="col-12">
                                <label for="authorityName"
                                       class="form-label">
                                    Authority Name
                                    <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-building"></i>
                                    </span>
                                    <input type="text"
                                           id="authorityName"
                                           th:field="*{authorityName}"
                                           class="form-control"
                                           placeholder="e.g. Balobedu Traditional Authority"
                                           required>
                                </div>
                                <div class="form-text">
                                    Must be unique across all registered authorities.
                                </div>
                            </div>

                            <!-- Region -->
                            <div class="col-12 col-md-6">
                                <label for="region" class="form-label">
                                    Province / Region
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-geo"></i>
                                    </span>
                                    <select id="region"
                                            th:field="*{region}"
                                            class="form-select">
                                        <option value="">— Select Province —</option>
                                        <option value="Limpopo">Limpopo</option>
                                        <option value="Mpumalanga">Mpumalanga</option>
                                        <option value="KwaZulu-Natal">KwaZulu-Natal</option>
                                        <option value="Eastern Cape">Eastern Cape</option>
                                        <option value="Northern Cape">Northern Cape</option>
                                        <option value="North West">North West</option>
                                        <option value="Gauteng">Gauteng</option>
                                        <option value="Free State">Free State</option>
                                        <option value="Western Cape">Western Cape</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Physical Address -->
                            <div class="col-12 col-md-6">
                                <label for="physicalAddress"
                                       class="form-label">
                                    Physical Address
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-pin-map"></i>
                                    </span>
                                    <input type="text"
                                           id="physicalAddress"
                                           th:field="*{physicalAddress}"
                                           class="form-control"
                                           placeholder="e.g. 1 Chief's Kraal Road">
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- ── Leadership ──────────────────────────────────── -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-white border-bottom py-3">
                        <h6 class="fw-bold text-navy mb-0">
                            <i class="bi bi-person-badge me-2"></i>
                            Leadership Details
                        </h6>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">

                            <!-- Chief Name -->
                            <div class="col-12 col-md-6">
                                <label for="chiefName" class="form-label">
                                    Chief / Inkosi Name
                                    <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-person-fill"></i>
                                    </span>
                                    <input type="text"
                                           id="chiefName"
                                           th:field="*{chiefName}"
                                           class="form-control"
                                           placeholder="e.g. Chief Sipho Dlamini"
                                           required>
                                </div>
                            </div>

                            <!-- Headman Name -->
                            <div class="col-12 col-md-6">
                                <label for="headmanName" class="form-label">
                                    Headman / Induna Name
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-person"></i>
                                    </span>
                                    <input type="text"
                                           id="headmanName"
                                           th:field="*{headmanName}"
                                           class="form-control"
                                           placeholder="e.g. Headman Thabo Sithole">
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- ── Contact Information ─────────────────────────── -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-white border-bottom py-3">
                        <h6 class="fw-bold text-navy mb-0">
                            <i class="bi bi-telephone me-2"></i>
                            Contact Information
                        </h6>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">

                            <!-- Phone -->
                            <div class="col-12 col-md-6">
                                <label for="contactPhone"
                                       class="form-label">
                                    Contact Phone
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-telephone"></i>
                                    </span>
                                    <input type="tel"
                                           id="contactPhone"
                                           th:field="*{contactPhone}"
                                           class="form-control"
                                           placeholder="e.g. +27821234567">
                                </div>
                                <div class="form-text">
                                    Format: +27XXXXXXXXX or 0XXXXXXXXX
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="col-12 col-md-6">
                                <label for="contactEmail"
                                       class="form-label">
                                    Contact Email
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="bi bi-envelope"></i>
                                    </span>
                                    <input type="email"
                                           id="contactEmail"
                                           th:field="*{contactEmail}"
                                           class="form-control"
                                           placeholder="e.g. office@authority.co.za">
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- ── Form Actions ────────────────────────────────── -->
                <div class="d-flex gap-3 justify-content-end">
                    <a th:href="@{/authorities}"
                       class="btn btn-light px-4">
                        <i class="bi bi-x me-1"></i>Cancel
                    </a>
                    <button type="reset"
                            class="btn btn-outline-secondary px-4">
                        <i class="bi bi-arrow-counterclockwise me-1"></i>
                        Reset
                    </button>
                    <button type="submit"
                            class="btn btn-navy px-4 fw-semibold">
                        <i class="bi bi-building-add me-2"></i>
                        Register Authority
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ── Phone number formatter ─────────────────────────────────────────────
    document.getElementById('contactPhone')
        .addEventListener('blur', function () {
            let v = this.value.replace(/\s/g, '');
            if (v.startsWith('0') && v.length === 10) {
                this.value = '+27' + v.substring(1);
            }
        });

    // ── Auto-generate placeholder preview ─────────────────────────────────
    document.getElementById('authorityName')
        .addEventListener('input', function () {
            const name = this.value.trim();
            if (name) {
                document.title = name + ' | TALOMS';
            }
        });
</script>
</body>
</html>
