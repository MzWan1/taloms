<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Village | TALOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/taloms.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav th:replace="~{fragments/navbar :: navbar('authorities')}"></nav>
<div class="container-fluid px-4 py-4">

    <!-- Flash -->
    <div th:if="${errorMessage}"
         class="alert alert-danger alert-dismissible fade show border-0 shadow-sm mb-4">
        <i class="bi bi-exclamation-circle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Breadcrumb + Header -->
    <div class="d-flex align-items-start justify-content-between mb-4 flex-wrap gap-3">
        <div>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-1 small">
                    <li class="breadcrumb-item">
                        <a th:href="@{/dashboard}"
                           class="text-muted text-decoration-none">Dashboard</a>
                    </li>
                    <li class="breadcrumb-item">
                        <a th:href="@{/authorities}"
                           class="text-muted text-decoration-none">Authorities</a>
                    </li>
                    <li class="breadcrumb-item">
                        <a th:href="@{/authorities/{id}/edit(id=${authority.id})}"
                           class="text-muted text-decoration-none"
                           th:text="${authority.authorityName}">Authority</a>
                    </li>
                    <li class="breadcrumb-item active">Add Village</li>
                </ol>
            </nav>
            <h4 class="fw-bold text-navy mb-0">
                <i class="bi bi-houses me-2"></i>Add Village
            </h4>
            <p class="text-muted small mb-0">
                Add a village under
                <strong th:text="${authority.authorityName}">Authority</strong>
            </p>
        </div>
        <a th:href="@{/authorities/{id}/edit(id=${authority.id})}"
           class="btn btn-outline-secondary px-3">
            <i class="bi bi-arrow-left me-1"></i>Back to Authority
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-7 col-xl-6">

            <!-- Authority Info Banner -->
            <div class="card border-0 shadow-sm mb-4"
                 style="border-left: 4px solid #1B3A6B !important;">
                <div class="card-body py-3 px-4 d-flex align-items-center gap-3">
                    <div class="authority-avatar-sm">
                        <i class="bi bi-building text-navy fs-5"></i>
                    </div>
                    <div>
                        <div class="fw-bold text-navy small"
                             th:text="${authority.authorityName}">Authority</div>
                        <div class="text-muted" style="font-size:0.8rem">
                            <span th:text="${'Chief: ' + authority.chiefName}"></span>
                            <span th:if="${authority.region != null}"
                                  th:text="${' · ' + authority.region}"></span>
                        </div>
                    </div>
                    <div class="ms-auto">
                        <span class="badge bg-navy"
                              th:text="${authority.villageCount + ' village(s)'}">
                            0 villages
                        </span>
                    </div>
                </div>
            </div>

            <!-- Village Form -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom py-3">
                    <h6 class="fw-bold text-navy mb-0">
                        <i class="bi bi-houses me-2"></i>Village Details
                    </h6>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/authorities/{id}/villages/create(id=${authority.id})}"
                          th:object="${form}"
                          method="post"
                          novalidate>

                        <!-- Village Name -->
                        <div class="mb-3">
                            <label for="villageName" class="form-label">
                                Village Name <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-houses"></i>
                                </span>
                                <input type="text"
                                       id="villageName"
                                       th:field="*{villageName}"
                                       class="form-control"
                                       placeholder="e.g. Moletji Village"
                                       required
                                       autofocus>
                            </div>
                            <div class="form-text">
                                Must be unique within this Traditional Authority.
                            </div>
                        </div>

                        <!-- Headman Name -->
                        <div class="mb-3">
                            <label for="headmanName" class="form-label">
                                Headman / Induna Name
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person"></i>
                                </span>
                                <input type="text"
                                       id="headmanName"
                                       th:field="*{headmanName}"
                                       class="form-control"
                                       placeholder="e.g. Headman Jonas Sithole">
                            </div>
                        </div>

                        <!-- Region -->
                        <div class="mb-3">
                            <label for="region" class="form-label">
                                Sub-region / Area
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-geo"></i>
                                </span>
                                <input type="text"
                                       id="region"
                                       th:field="*{region}"
                                       class="form-control"
                                       placeholder="e.g. Northern Settlement">
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="mb-4">
                            <label for="description" class="form-label">
                                Description
                            </label>
                            <textarea id="description"
                                      th:field="*{description}"
                                      class="form-control"
                                      rows="3"
                                      placeholder="Optional notes about this village..."></textarea>
                        </div>

                        <!-- Actions -->
                        <div class="d-flex gap-3 justify-content-end">
                            <a th:href="@{/authorities/{id}/edit(id=${authority.id})}"
                               class="btn btn-light px-4">
                                <i class="bi bi-x me-1"></i>Cancel
                            </a>
                            <button type="submit"
                                    class="btn btn-navy px-4 fw-semibold">
                                <i class="bi bi-plus-circle me-2"></i>Add Village
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<style>
    .authority-avatar-sm {
        width: 42px; height: 42px;
        background: #D6E4F0;
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
