<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Business Occupancy | TALOMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/taloms.css}" rel="stylesheet">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar('business-occupancies')}"></nav>

<div class="container-fluid px-4 py-4">

    <!-- Flash -->
    <div th:if="${errorMessage}"
         class="alert alert-danger alert-dismissible fade show border-0 shadow-sm mb-4">
        <i class="bi bi-exclamation-circle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Header -->
    <div class="d-flex align-items-start justify-content-between mb-4 flex-wrap gap-3">
        <div>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-1 small">
                    <li class="breadcrumb-item">
                        <a th:href="@{/dashboard}" class="text-muted text-decoration-none">Dashboard</a>
                    </li>
                    <li class="breadcrumb-item">
                        <a th:href="@{/business-occupancies}" class="text-muted text-decoration-none">Businesses</a>
                    </li>
                    <li class="breadcrumb-item active">New Business</li>
                </ol>
            </nav>
            <h4 class="fw-bold text-navy mb-0">
                <i class="bi bi-shop me-2"></i>Register New Business
            </h4>
            <p class="text-muted small mb-0">Register a commercial business on Traditional Authority land</p>
        </div>
        <a th:href="@{/business-occupancies}" class="btn btn-outline-secondary px-3">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-9">
            <form th:action="@{/business-occupancies/create}"
                  th:object="${form}"
                  method="post">

                <div class="row g-4">

                    <!-- LEFT -->
                    <div class="col-12 col-lg-6">

                        <!-- Business Details -->
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-header bg-white border-bottom py-3">
                                <h6 class="fw-bold text-navy mb-0">
                                    <i class="bi bi-building me-2"></i>Business Details
                                </h6>
                            </div>
                            <div class="card-body p-4">
                                <div class="row g-3">
                                    <!-- Business Name -->
                                    <div class="col-12">
                                        <label for="businessName" class="form-label">
                                            Business Name <span class="text-danger">*</span>
                                        </label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-shop"></i></span>
                                            <input type="text" id="businessName" name="businessName"
                                                   class="form-control" placeholder="e.g. Thabo's Supermarket"
                                                   required>
                                        </div>
                                    </div>

                                    <!-- Registration Number -->
                                    <div class="col-12">
                                        <label for="registrationNumber" class="form-label">Registration Number</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-hash"></i></span>
                                            <input type="text" id="registrationNumber" name="registrationNumber"
                                                   class="form-control" placeholder="e.g. 2023/123456/07">
                                        </div>
                                        <div class="form-text">Company or CC registration number (optional)</div>
                                    </div>

                                    <!-- Business Type -->
                                    <div class="col-12">
                                        <label for="businessType" class="form-label">
                                            Business Type <span class="text-danger">*</span>
                                        </label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-tag"></i></span>
                                            <select id="businessType" name="businessType" class="form-select" required>
                                                <option value="">— Select Type —</option>
                                                <option th:each="t : ${types}"
                                                        th:value="${t.name()}"
                                                        th:text="${t.displayName}">
                                                </option>
                                            </select>
                                        </div>
                                    </div>

                                    <!-- Operating Hours -->
                                    <div class="col-12">
                                        <label for="operatingHours" class="form-label">Operating Hours</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-clock"></i></span>
                                            <input type="text" id="operatingHours" name="operatingHours"
                                                   class="form-control" placeholder="e.g. Mon-Fri 8am-5pm, Sat 9am-2pm">
                                        </div>
                                    </div>

                                    <!-- Employees Count -->
                                    <div class="col-12">
                                        <label for="employeesCount" class="form-label">Number of Employees</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-people"></i></span>
                                            <input type="number" id="employeesCount" name="employeesCount"
                                                   class="form-control" min="0" th:value="${form.employeesCount}">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT -->
                    <div class="col-12 col-lg-6">

                        <!-- Owner Details -->
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-header bg-white border-bottom py-3">
                                <h6 class="fw-bold text-navy mb-0">
                                    <i class="bi bi-person me-2"></i>Owner Details
                                </h6>
                            </div>
                            <div class="card-body p-4">
                                <div class="row g-3">
                                    <!-- Owner Name -->
                                    <div class="col-12">
                                        <label for="ownerName" class="form-label">
                                            Owner Name <span class="text-danger">*</span>
                                        </label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                                            <input type="text" id="ownerName" name="ownerName"
                                                   class="form-control" placeholder="e.g. Thabo Mokoena"
                                                   required>
                                        </div>
                                    </div>

                                    <!-- Owner ID Number -->
                                    <div class="col-12">
                                        <label for="ownerIdNumber" class="form-label">
                                            Owner ID Number <span class="text-danger">*</span>
                                        </label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-credit-card"></i></span>
                                            <input type="text" id="ownerIdNumber" name="ownerIdNumber"
                                                   class="form-control" placeholder="13-digit ID number"
                                                   maxlength="13" required>
                                        </div>
                                        <div class="mt-1" id="idFeedback" style="display:none"></div>
                                    </div>

                                    <!-- Contact Phone -->
                                    <div class="col-12">
                                        <label for="contactPhone" class="form-label">Contact Phone</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                            <input type="tel" id="contactPhone" name="contactPhone"
                                                   class="form-control" placeholder="+27XXXXXXXXX">
                                        </div>
                                    </div>

                                    <!-- Contact Email -->
                                    <div class="col-12">
                                        <label for="contactEmail" class="form-label">Contact Email</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                            <input type="email" id="contactEmail" name="contactEmail"
                                                   class="form-control" placeholder="e.g. info@business.co.za">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Full Width - Location -->
                    <div class="col-12">
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-header bg-white border-bottom py-3">
                                <h6 class="fw-bold text-navy mb-0">
                                    <i class="bi bi-geo-alt me-2"></i>Location & PTO
                                </h6>
                            </div>
                            <div class="card-body p-4">
                                <div class="row g-3">
                                    <!-- Parcel -->
                                    <div class="col-12 col-md-6">
                                        <label for="parcelId" class="form-label">
                                            Parcel <span class="text-danger">*</span>
                                        </label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-map"></i></span>
                                            <select id="parcelId" name="parcelId" class="form-select" required>
                                                <option value="">— Select Parcel —</option>
                                                <option th:each="p : ${availableParcels}"
                                                        th:value="${p.id}"
                                                        th:text="${'Stand ' + p.standNumber + ' (' + p.parcelNumber + ') - ' + p.villageName}">
                                                </option>
                                            </select>
                                        </div>
                                        <div class="form-text">Only available parcels can be selected</div>
                                    </div>

                                    <!-- PTO -->
                                    <div class="col-12 col-md-6">
                                        <label for="ptoId" class="form-label">
                                            PTO <span class="text-danger">*</span>
                                        </label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-file-earmark-text"></i></span>
                                            <select id="ptoId" name="ptoId" class="form-select" required>
                                                <option value="">— Select PTO —</option>
                                                <option th:each="pto : ${activePtos}"
                                                        th:value="${pto.id}"
                                                        th:text="${pto.ptoNumber + ' - ' + pto.ptoHolderName}">
                                                </option>
                                            </select>
                                        </div>
                                    </div>

                                    <!-- Notes -->
                                    <div class="col-12">
                                        <label for="notes" class="form-label">Notes</label>
                                        <textarea id="notes" name="notes" class="form-control" rows="2"
                                                  placeholder="Additional notes about this business..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <div class="d-flex gap-3 justify-content-end mt-4 mb-4">
                    <a th:href="@{/business-occupancies}" class="btn btn-light px-4">
                        <i class="bi bi-x me-1"></i>Cancel
                    </a>
                    <button type="submit" class="btn btn-navy px-4 fw-semibold">
                        <i class="bi bi-save me-2"></i>Register Business
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ── SA ID number validator (Luhn) ──────────────────────────────────────
    document.getElementById('ownerIdNumber').addEventListener('input', function () {
        const val = this.value.replace(/\D/g, '');
        this.value = val;
        const fb = document.getElementById('idFeedback');

        if (val.length === 13) {
            const valid = luhn(val);
            fb.style.display = 'block';
            if (valid) {
                fb.innerHTML = '<small class="text-success"><i class="bi bi-check-circle me-1"></i>Valid SA ID</small>';
                this.classList.remove('is-invalid');
                this.classList.add('is-valid');
            } else {
                fb.innerHTML = '<small class="text-danger"><i class="bi bi-x-circle me-1"></i>Invalid SA ID number</small>';
                this.classList.add('is-invalid');
                this.classList.remove('is-valid');
            }
        } else {
            fb.style.display = 'none';
            this.classList.remove('is-valid', 'is-invalid');
        }
    });

    function luhn(id) {
        let sum = 0;
        for (let i = 0; i < 13; i++) {
            let d = parseInt(id[i]);
            if (i % 2 === 1) {
                d *= 2;
                if (d > 9) d -= 9;
            }
            sum += d;
        }
        return sum % 10 === 0;
    }

    // ── Phone formatter ────────────────────────────────────────────────────
    document.getElementById('contactPhone').addEventListener('blur', function () {
        let v = this.value.replace(/\s/g, '');
        if (v.startsWith('0') && v.length === 10) {
            this.value = '+27' + v.substring(1);
        }
    });
</script>
</body>
</html>
