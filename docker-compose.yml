services:
  db:
    image: postgis/postgis:16-3.4
    container_name: taloms_db
    environment:
      POSTGRES_DB: taloms_db
      POSTGRES_USER: taloms_user
      POSTGRES_PASSWORD: taloms_pass
    ports:
      - "5432:5432"
    volumes:
      - taloms_db_data:/var/lib/postgresql/data
      - ./src/main/docker/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taloms_user -d taloms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  taloms_db_data: